<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global News Heatmap - 性能优化版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1d3a 100%);
            overflow: hidden;
            color: #fff;
        }

        #globe-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .controls {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            min-width: 280px;
        }

        .controls h2 {
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .filter-group {
            margin-bottom: 15px;
        }

        .filter-group:last-child {
            margin-bottom: 0;
        }

        .filter-group label {
            display: block;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filter-group select,
        .filter-group button {
            width: 100%;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-group button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-weight: 600;
            margin-top: 5px;
        }

        .filter-group button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .filter-group button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .performance-toggle {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .performance-toggle button {
            flex: 1;
            padding: 6px 10px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.1);
        }

        .performance-toggle button.active {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .stats {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            min-width: 200px;
        }

        .stat-item {
            margin-bottom: 15px;
        }

        .stat-item:last-child {
            margin-bottom: 0;
        }

        .stat-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .stat-value .unit {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-left: 5px;
        }

        .stat-value.small {
            font-size: 14px;
        }

        .legend {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px 20px;
        }

        .legend-title {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .legend-scale {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .legend-gradient {
            width: 150px;
            height: 20px;
            background: linear-gradient(to right, #1e3a8a, #3b82f6, #fbbf24, #ef4444);
            border-radius: 4px;
        }

        .legend-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 5px;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            text-align: center;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.4s ease;
        }

        .modal-header {
            padding: 25px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .modal-body {
            padding: 30px;
            max-height: calc(80vh - 90px);
            overflow-y: auto;
        }

        .message-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }

        .message-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .message-source {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .message-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a1d3a;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .message-summary {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 12px;
            color: #999;
        }

        .tag {
            background: #f0f0f0;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            color: #666;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fps-counter {
            color: #10b981;
        }
    </style>
</head>
<body>
    <div id="globe-container"></div>

    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在加载地图数据...</div>
    </div>

    <div class="controls">
        <h2>筛选条件</h2>
        <div class="filter-group">
            <label>渲染质量</label>
            <div class="performance-toggle">
                <button id="quality-low" class="active">流畅模式</button>
                <button id="quality-high">高质量</button>
            </div>
        </div>
        <div class="filter-group">
            <label>行业标签</label>
            <select id="industry-filter">
                <option value="">全部行业</option>
                <option value="人工智能">人工智能</option>
                <option value="半导体">半导体</option>
                <option value="新能源">新能源</option>
            </select>
        </div>
    </div>

    <div class="stats">
        <div class="stat-item">
            <div class="stat-label">全球新闻</div>
            <div class="stat-value">
                <span id="total-news">0</span>
                <span class="unit">条</span>
            </div>
        </div>
        <div class="stat-item">
            <div class="stat-label">覆盖区域</div>
            <div class="stat-value">
                <span id="total-regions">0</span>
                <span class="unit">个</span>
            </div>
        </div>
        <div class="stat-item">
            <div class="stat-label">性能</div>
            <div class="stat-value small fps-counter">
                <span id="fps">60</span> FPS
            </div>
        </div>
    </div>

    <div class="legend">
        <div class="legend-title">新闻密度</div>
        <div class="legend-scale">
            <div>
                <div class="legend-gradient"></div>
                <div class="legend-labels">
                    <span>0</span>
                    <span>100</span>
                    <span>200+</span>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modal-title">新闻详情</div>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <!-- 引入Three.js、TopoJSON和Globe.gl -->
    <script src="//unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="//unpkg.com/topojson-client@3/dist/topojson-client.min.js"></script>
    <script src="//unpkg.com/globe.gl@2.31.0/dist/globe.gl.min.js"></script>

    <script>
        let globe;
        let performanceMode = 'low'; // 'low' or 'high'
        let worldGeoData = null;
        let fpsCounter = { frames: 0, lastTime: performance.now() };

        // Mock数据
        const countryNewsCount = {
            'China': 256, 'United States of America': 389, 'United Kingdom': 145,
            'Germany': 178, 'France': 123, 'Japan': 201, 'India': 167,
            'Brazil': 89, 'Australia': 92, 'Canada': 118, 'Russia': 156,
            'South Korea': 134, 'Italy': 98, 'Spain': 87, 'Mexico': 76
        };

        const mockMessages = [
            {
                source: '同花顺7x24快讯',
                title: 'AI芯片产业迎来重大突破',
                summary: '国内某头部芯片企业宣布成功研发出7纳米制程AI芯片。',
                published_at: '2025-11-13 14:30',
                industry_tags: ['人工智能', '半导体']
            }
        ];

        // 颜色映射
        function getHeatmapColor(count) {
            if (count === 0 || count === undefined) return 'rgba(30, 58, 138, 0.3)';
            if (count < 100) return 'rgba(59, 130, 246, 0.5)';
            if (count < 200) return 'rgba(251, 191, 36, 0.6)';
            return 'rgba(239, 68, 68, 0.7)';
        }

        // 初始化Globe
        function initGlobe() {
            globe = Globe()
                .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
                .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
                .showAtmosphere(true)
                .atmosphereColor('#00d4ff')
                .atmosphereAltitude(0.1)
                (document.getElementById('globe-container'));

            globe.pointOfView({ lat: 20, lng: 0, altitude: 2.5 }, 0);

            // 低质量模式默认禁用自动旋转
            globe.controls().autoRotate = false;
            globe.controls().enableDamping = true;
            globe.controls().dampingFactor = 0.1;

            window.addEventListener('resize', () => {
                globe.width(window.innerWidth);
                globe.height(window.innerHeight);
            });

            // FPS监控
            function updateFPS() {
                fpsCounter.frames++;
                const now = performance.now();
                const delta = now - fpsCounter.lastTime;
                if (delta >= 1000) {
                    const fps = Math.round((fpsCounter.frames * 1000) / delta);
                    document.getElementById('fps').textContent = fps;
                    fpsCounter.frames = 0;
                    fpsCounter.lastTime = now;
                }
                requestAnimationFrame(updateFPS);
            }
            updateFPS();
        }

        // 加载世界地图（使用TopoJSON）
        async function loadWorldView() {
            try {
                const response = await fetch('./world_countries_low.geojson');
                const topoData = await response.json();

                // TopoJSON转GeoJSON
                worldGeoData = topojson.feature(topoData, topoData.objects.countries);

                // 添加新闻数据
                worldGeoData.features.forEach(feature => {
                    const name = feature.properties.name;
                    feature.properties.newsCount = countryNewsCount[name] || Math.floor(Math.random() * 50);
                });

                renderWorldPolygons();
                updateStats();

            } catch (error) {
                console.error('加载地图失败:', error);
                document.getElementById('loading').innerHTML =
                    `<div style="color: #ef4444;">加载失败: ${error.message}</div>`;
            }
        }

        // 渲染世界多边形
        function renderWorldPolygons() {
            const altitude = performanceMode === 'low' ? 0.006 : 0.01;

            globe
                .polygonsData(worldGeoData.features)
                .polygonCapColor(d => getHeatmapColor(d.properties.newsCount))
                .polygonSideColor(() => 'rgba(0, 100, 200, 0.1)')
                .polygonStrokeColor(() => performanceMode === 'low' ? 'rgba(0, 212, 255, 0.3)' : '#00d4ff')
                .polygonAltitude(altitude)
                .polygonLabel(d => `
                    <div style="background: rgba(0,0,0,0.9); padding: 8px 12px; border-radius: 6px; color: white;">
                        <strong>${d.properties.name}</strong><br>
                        <span style="color: #00d4ff;">${d.properties.newsCount || 0} 条新闻</span>
                    </div>
                `)
                .onPolygonClick(d => {
                    showNewsModal(d.properties.name, d.properties.newsCount || 0);
                })
                .onPolygonHover(d => {
                    document.body.style.cursor = d ? 'pointer' : 'default';
                });
        }

        // 更新统计
        function updateStats() {
            let total = 0, regions = 0;

            if (worldGeoData) {
                worldGeoData.features.forEach(f => total += f.properties.newsCount || 0);
                regions = worldGeoData.features.length;
            }

            document.getElementById('total-news').textContent = total;
            document.getElementById('total-regions').textContent = regions;
        }

        // 显示新闻弹窗
        function showNewsModal(regionName, count) {
            const modal = document.getElementById('modal');
            document.getElementById('modal-title').textContent = `${regionName} - ${count}条新闻`;

            document.getElementById('modal-body').innerHTML = mockMessages.map(msg => `
                <div class="message-card">
                    <div class="message-source">${msg.source}</div>
                    <div class="message-title">${msg.title}</div>
                    <div class="message-summary">${msg.summary}</div>
                    <div class="message-meta">
                        <span>📅 ${msg.published_at}</span>
                        ${msg.industry_tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                </div>
            `).join('');

            modal.classList.add('active');
        }

        // 事件监听
        document.getElementById('modal-close').addEventListener('click', () => {
            document.getElementById('modal').classList.remove('active');
        });

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') e.target.classList.remove('active');
        });

        // 性能模式切换
        document.getElementById('quality-low').addEventListener('click', function() {
            performanceMode = 'low';
            this.classList.add('active');
            document.getElementById('quality-high').classList.remove('active');
            globe.controls().autoRotate = false;
            renderWorldPolygons();
        });

        document.getElementById('quality-high').addEventListener('click', function() {
            performanceMode = 'high';
            this.classList.add('active');
            document.getElementById('quality-low').classList.remove('active');
            globe.controls().autoRotate = true;
            globe.controls().autoRotateSpeed = 0.2;
            renderWorldPolygons();
        });

        // 初始化
        initGlobe();
        loadWorldView().then(() => {
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
            }, 1000);
        });
    </script>
</body>
</html>
