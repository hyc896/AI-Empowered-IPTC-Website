version: "3.8"

name: iptc-platform

# ================================================================
# 统一部署编排：一期（案例采集）+ 二期（学生实践）
# MySQL 单实例承载 iptc_main + iptc_practice 两个 Schema
# ================================================================

services:

  # ---------------------------------------------------------------
  # 基础设施
  # ---------------------------------------------------------------

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-iptc_prod_2025}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max-connections=300
      --innodb-buffer-pool-size=512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-iptc_prod_2025}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 160M
    restart: unless-stopped

  # ---------------------------------------------------------------
  # 二期：学生实践平台（Vue3 + FastAPI 8001）
  # ---------------------------------------------------------------

  practice-backend:
    build:
      context: ./二期
      dockerfile: Dockerfile
    volumes:
      - uploads_data:/app/backend/data/uploads
      - ./二期/.env.production:/app/config/.env:ro
    env_file:
      - ./二期/.env.production
    environment:
      - TZ=Asia/Shanghai
      - COLLECTOR_URL=http://collector-backend:11528
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  practice-celery:
    build:
      context: ./二期
      dockerfile: Dockerfile
    command: celery -A celery_app worker --loglevel=info --pool=solo --concurrency=2
    working_dir: /app/backend
    volumes:
      - uploads_data:/app/backend/data/uploads
      - ./二期/.env.production:/app/config/.env:ro
    env_file:
      - ./二期/.env.production
    environment:
      - TZ=Asia/Shanghai
      - COLLECTOR_URL=http://collector-backend:11528
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384M
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./二期/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - practice-backend
      - collector-backend
    deploy:
      resources:
        limits:
          memory: 64M
    restart: unless-stopped

  # ---------------------------------------------------------------
  # 一期：案例采集平台（FastAPI 11528 + Celery Beat）
  # ---------------------------------------------------------------

  collector-backend:
    build:
      context: ./一期
      dockerfile: Dockerfile
    command: sh -c "sleep 5 && uvicorn backend.main:app --host 0.0.0.0 --port 11528 --workers 2"
    ports:
      - "11528:11528"
    volumes:
      - chromadb_data:/app/backend/data/chromadb_new
      - ./一期/backend/data/prompts:/app/backend/data/prompts:ro
      - ./一期/config.yaml:/app/config.yaml:ro
    environment:
      - TZ=Asia/Shanghai
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=iptc_main
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD:-iptc_prod_2025}
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CHROMADB_MODE=local
      - CHROMADB_PATH=/app/backend/data/chromadb_new
      - REDIS_HOST=redis
      - PLAYWRIGHT_HEADLESS=1
      - LLM_MODEL=Pro/moonshotai/Kimi-K2.6
      - LLM_TIMEOUT=600
      - FAST_LLM_MODEL=Qwen/Qwen2.5-7B-Instruct
      - FAST_LLM_TIMEOUT=20
      - MATCH_SIMILARITY_THRESHOLD=0.62
      - NATIONAL_CASE_GENERATION_THRESHOLD=6
      - SHANGHAI_CASE_GENERATION_THRESHOLD=4
      - COLLECTOR_FIELD_ENRICHER_ENABLED=1
      - COLLECTOR_FIELD_ENRICHER_TIMEOUT=12
      - COLLECTOR_FIELD_ENRICHER_RETRIES=1
      - COLLECTOR_SCHEDULE_ENABLED=0
      - COLLECTOR_TRIGGER_ON_STARTUP=0
      - COLLECTOR_TIMEOUT_SECONDS=300
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  collector-celery-worker:
    build:
      context: ./一期
      dockerfile: Dockerfile
    command: celery -A backend.tasks worker -Q collector,default --loglevel=info --pool=solo --concurrency=1
    volumes:
      - chromadb_data:/app/backend/data/chromadb_new
      - ./一期/backend/data/prompts:/app/backend/data/prompts:ro
      - ./一期/config.yaml:/app/config.yaml:ro
    environment:
      - TZ=Asia/Shanghai
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=iptc_main
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD:-iptc_prod_2025}
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CHROMADB_MODE=local
      - CHROMADB_PATH=/app/backend/data/chromadb_new
      - REDIS_HOST=redis
      - PLAYWRIGHT_HEADLESS=1
      - LLM_MODEL=Pro/moonshotai/Kimi-K2.6
      - LLM_TIMEOUT=600
      - FAST_LLM_MODEL=Qwen/Qwen2.5-7B-Instruct
      - FAST_LLM_TIMEOUT=20
      - MATCH_SIMILARITY_THRESHOLD=0.62
      - NATIONAL_CASE_GENERATION_THRESHOLD=6
      - SHANGHAI_CASE_GENERATION_THRESHOLD=4
      - COLLECTOR_FIELD_ENRICHER_ENABLED=1
      - COLLECTOR_FIELD_ENRICHER_TIMEOUT=12
      - COLLECTOR_FIELD_ENRICHER_RETRIES=1
      - COLLECTOR_SCHEDULE_ENABLED=0
      - COLLECTOR_TRIGGER_ON_STARTUP=0
      - COLLECTOR_TIMEOUT_SECONDS=300
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M
    restart: unless-stopped

  collector-celery-beat:
    build:
      context: ./一期
      dockerfile: Dockerfile
    command: celery -A backend.tasks beat --loglevel=info --scheduler celery.beat:Scheduler
    volumes:
      - chromadb_data:/app/backend/data/chromadb_new
      - ./一期/backend/data/prompts:/app/backend/data/prompts:ro
      - ./一期/config.yaml:/app/config.yaml:ro
    environment:
      - TZ=Asia/Shanghai
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=iptc_main
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD:-iptc_prod_2025}
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CHROMADB_MODE=local
      - CHROMADB_PATH=/app/backend/data/chromadb_new
      - REDIS_HOST=redis
      - PLAYWRIGHT_HEADLESS=1
      - LLM_MODEL=Pro/moonshotai/Kimi-K2.6
      - LLM_TIMEOUT=600
      - FAST_LLM_MODEL=Qwen/Qwen2.5-7B-Instruct
      - FAST_LLM_TIMEOUT=20
      - MATCH_SIMILARITY_THRESHOLD=0.62
      - NATIONAL_CASE_GENERATION_THRESHOLD=6
      - SHANGHAI_CASE_GENERATION_THRESHOLD=4
      - COLLECTOR_FIELD_ENRICHER_ENABLED=1
      - COLLECTOR_FIELD_ENRICHER_TIMEOUT=12
      - COLLECTOR_FIELD_ENRICHER_RETRIES=1
      - COLLECTOR_SCHEDULE_ENABLED=0
      - COLLECTOR_TRIGGER_ON_STARTUP=0
      - COLLECTOR_TIMEOUT_SECONDS=300
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  uploads_data:
  chromadb_data:
  frontend_dist:
