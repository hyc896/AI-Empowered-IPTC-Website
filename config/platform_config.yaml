# 消息平台配置文件

# 数据库配置
database:
  mysql:
    host: "localhost"
    port: 3306
    user: "root"
    password: "123456"
    database: "message_platform"
    charset: "utf8mb4"
    pool_size: 20
    max_overflow: 30
    pool_timeout: 30
    pool_recycle: 3600

  chromadb:
    host: "localhost"
    port: 8000
    collection_prefix: "mp_"
    persist_directory: "./data/chromadb"

# Web服务配置
web:
  host: "0.0.0.0"
  port: 11523
  workers: 1
  reload: false
  log_level: "info"

# 消息源管理配置
sources:
  auto_start: true
  health_check_interval: 60
  max_retry_attempts: 3
  retry_delay: 30

# 消息检索配置
retrieval:
  similarity_threshold: 0.4
  rrf_k: 60
  max_results: 100
  search_timeout: 30

# 向量同步配置
vector_sync:
  enabled: true
  mode: "incremental"
  batch_size: 1000
  sync_interval: 300  # 5分钟

# 新闻采集配置
news:
  rss_crawler:
    enabled: true
    interval: 300
    timeout: 30

  deduplication:
    bloom_filter_size: 100000
    similarity_threshold: 0.85

  summarization:
    enabled: true
    max_length: 1000
    model: "qwen3-max"

# 采集器配置
collectors:
  tonghuashun:
    enabled: true
    interval: 15
    timeout: 30
    max_pages: 10

  kr36:
    enabled: true
    interval: 30
    timeout: 30
    max_pages: 5

  arxiv:
    enabled: true
    interval: 86400  # 24小时
    timeout: 60
    categories:
      - "cs.AI"
      - "cs.LG"
      - "cs.CL"
      - "stat.ML"

# API配置
api:
  title: "消息平台API"
  description: "个人Agent消息采集与检索平台"
  version: "1.0.0"
  docs_url: "/docs"
  redoc_url: "/redoc"

  # 认证配置（暂时禁用）
  auth:
    enabled: false
    secret_key: "your-secret-key-here"
    token_expire_hours: 24

  # 限流配置
  rate_limit:
    enabled: true
    requests_per_minute: 100
    burst_size: 20

# 缓存配置
cache:
  redis:
    enabled: false
    host: "localhost"
    port: 6379
    db: 1
    ttl: 3600

  # 内存缓存
  memory:
    enabled: true
    max_size: 1000
    ttl: 300

# 监控配置
monitoring:
  metrics:
    enabled: true
    endpoint: "/metrics"

  health_check:
    enabled: true
    endpoint: "/health"

  logging:
    level: "INFO"
    file: "./logs/platform.log"
    max_size: "100MB"
    backup_count: 5

# LLM配置（用于摘要生成等）
llm:
  chat:
    base_url: "http://localhost:11434/v1"
    model: "qwen3-max"
    api_key: "sk-your-api-key-here"
    timeout: 60
    temperature: 0.7
    max_tokens: 4000

  embedding:
    base_url: "http://localhost:11434/v1"
    model: "BAAI/bge-m3"
    api_key: "sk-your-api-key-here"
    timeout: 30
    batch_size: 100

# 安全配置
security:
  cors:
    enabled: true
    origins:
      - "http://localhost:3000"
      - "http://localhost:11522"
    methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
    headers:
      - "*"

  https:
    enabled: false
    cert_file: ""
    key_file: ""

# 开发配置
development:
  debug: true
  auto_reload: true
  profiling: false
  mock_external_apis: false