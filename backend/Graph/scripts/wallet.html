<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的钱包</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section {
            background-color: #ffffff;
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .title {
            font-size: 24px;
            font-weight: 500;
            color: #333;
            margin-bottom: 30px;
        }

        /* 账户余额区域 */
        .balance-section {
            display: flex;
            align-items: baseline;
            gap: 20px;
            margin-bottom: 40px;
        }

        .balance-label {
            font-size: 16px;
            color: #666;
        }

        .balance-amount {
            font-size: 56px;
            font-weight: 600;
            color: #333;
            letter-spacing: -1px;
        }

        .balance-link {
            font-size: 16px;
            color: #4a90e2;
            text-decoration: none;
            cursor: pointer;
        }

        .balance-link:hover {
            text-decoration: underline;
        }

        /* 订单提成区域 */
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .order-title {
            font-size: 18px;
            color: #333;
        }

        .order-total {
            font-size: 16px;
            color: #666;
            margin-left: 20px;
        }

        .order-link {
            font-size: 16px;
            color: #4a90e2;
            text-decoration: none;
            cursor: pointer;
        }

        .order-link:hover {
            text-decoration: underline;
        }

        /* 月度数据滚动区域 */
        .monthly-scroll {
            position: relative;
            overflow: hidden;
        }

        .monthly-data {
            display: flex;
            gap: 40px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .monthly-data::-webkit-scrollbar {
            display: none;
        }

        .monthly-item {
            flex-shrink: 0;
            text-align: center;
            min-width: 100px;
        }

        .monthly-amount {
            font-size: 28px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }

        .monthly-amount.highlight {
            color: #e74c3c;
        }

        .monthly-amount .icon {
            font-size: 16px;
            margin-left: 5px;
            color: #999;
        }

        .monthly-label {
            font-size: 14px;
            color: #999;
        }

        .monthly-label.highlight {
            color: #e74c3c;
        }

        .scroll-arrow {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ccc;
            font-size: 32px;
        }

        /* 赔偿区域 */
        .compensation-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px;
        }

        .compensation-title {
            font-size: 18px;
            color: #333;
        }

        .compensation-subtitle {
            font-size: 14px;
            color: #999;
            margin-bottom: 30px;
        }

        .compensation-data {
            display: flex;
            gap: 80px;
        }

        .compensation-item {
            text-align: center;
        }

        .compensation-amount {
            font-size: 32px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }

        .compensation-label {
            font-size: 14px;
            color: #999;
        }

        /* 派单订单区域 */
        .dispatch-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px;
        }

        .dispatch-title {
            font-size: 18px;
            color: #333;
        }

        .dispatch-subtitle {
            font-size: 14px;
            color: #999;
            margin-bottom: 30px;
        }

        .dispatch-data {
            display: flex;
            gap: 80px;
        }

        .dispatch-item {
            text-align: center;
        }

        .dispatch-amount {
            font-size: 32px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }

        .dispatch-label {
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题 -->
        <h1 class="title">我的钱包</h1>

        <!-- 账户余额区域 -->
        <div class="section">
            <div class="balance-section">
                <span class="balance-label">账户余额(元)</span>
                <span class="balance-amount">5000.00</span>
                <a href="#" class="balance-link">流水明细</a>
            </div>

            <!-- 已完工订单提成 -->
            <div class="order-header">
                <div>
                    <span class="order-title">已完工订单提成(元)</span>
                    <span class="order-total">累计: 62566元</span>
                </div>
                <a href="#" class="order-link">查看详情</a>
            </div>

            <div class="monthly-scroll">
                <div class="monthly-data">
                    <div class="monthly-item">
                        <div class="monthly-amount">290</div>
                        <div class="monthly-label">今日提成</div>
                    </div>
                    <div class="monthly-item">
                        <div class="monthly-amount">9290</div>
                        <div class="monthly-label">本月提成</div>
                    </div>
                    <div class="monthly-item">
                        <div class="monthly-amount">8000</div>
                        <div class="monthly-label">21年9月</div>
                    </div>
                    <div class="monthly-item">
                        <div class="monthly-amount highlight">9000 <span class="icon">⊙</span></div>
                        <div class="monthly-label highlight">21年8月</div>
                    </div>
                    <div class="monthly-item">
                        <div class="monthly-amount">9856</div>
                        <div class="monthly-label">21年7月</div>
                    </div>
                    <div class="monthly-item">
                        <div class="monthly-amount">7845</div>
                        <div class="monthly-label">21年6月</div>
                    </div>
                    <div class="monthly-item">
                        <div class="monthly-amount">5448</div>
                        <div class="monthly-label">21年5月</div>
                    </div>
                </div>
                <div class="scroll-arrow">≫</div>
            </div>
        </div>

        <!-- 我的赔偿区域 -->
        <div class="section">
            <div class="compensation-header">
                <span class="compensation-title">我的赔偿(元)</span>
                <a href="#" class="order-link">查看详情</a>
            </div>
            <div class="compensation-subtitle">(我的赔偿=平台赔偿x**%)</div>

            <div class="compensation-data">
                <div class="compensation-item">
                    <div class="compensation-amount">200</div>
                    <div class="compensation-label">我的赔偿</div>
                </div>
                <div class="compensation-item">
                    <div class="compensation-amount">1000</div>
                    <div class="compensation-label">平台赔偿</div>
                </div>
                <div class="compensation-item">
                    <div class="compensation-amount">1000</div>
                    <div class="compensation-label">师傅赔偿</div>
                </div>
            </div>
        </div>

        <!-- 已派单订单提成区域 -->
        <div class="section">
            <div class="dispatch-header">
                <span class="dispatch-title">已派单订单提成(元)</span>
                <a href="#" class="order-link">查看详情</a>
            </div>
            <div class="dispatch-subtitle">(当日、当月已派订单=所派订单-已取消订单)</div>

            <div class="dispatch-data">
                <div class="dispatch-item">
                    <div class="dispatch-amount">290</div>
                    <div class="dispatch-label">今日提成</div>
                </div>
                <div class="dispatch-item">
                    <div class="dispatch-amount">9290</div>
                    <div class="dispatch-label">本月提成</div>
                </div>
                <div class="dispatch-item">
                    <div class="dispatch-amount">9290</div>
                    <div class="dispatch-label">累计提成</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 月度数据滚动功能
        const scrollArrow = document.querySelector('.scroll-arrow');
        const monthlyData = document.querySelector('.monthly-data');

        scrollArrow.addEventListener('click', () => {
            monthlyData.scrollBy({
                left: 200,
                behavior: 'smooth'
            });
        });

        // 链接点击事件
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                alert('功能开发中...');
            });
        });
    </script>
</body>
</html>
