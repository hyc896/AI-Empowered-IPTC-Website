# PersonalAgent Configuration File

# ========================
# LLM Configuration
# ========================
llm:
  # Chat模型配置（主模型，用于复杂推理任务）
  chat:
    base_url: "${LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}"
    api_key: "${LLM_API_KEY:sk-da598e8ebde449dfbb3d4578854b0502}"
    model: "${LLM_MODEL:qwen3-max}"
    timeout: 210
    temperature: 0.7

  # Embedding模型配置
  embedding:
    base_url: "${EMBEDDING_BASE_URL:https://api.siliconflow.cn/v1}"
    api_key: "${EMBEDDING_API_KEY:sk-tpnnprwtipwwbtojamuccbosjlezyhlqhvplyxnqmqyfiqyg}"
    model: "${EMBEDDING_MODEL:BAAI/bge-m3}"
    timeout: 30
    output_dim: 1024  # bge-m3的向量维度

  # Fast模型配置（轻量快速模型，用于简单任务如摘要、翻译等）
  fast:
    base_url: "${FAST_LLM_BASE_URL:https://api.siliconflow.cn/v1}"
    api_key: "${FAST_LLM_API_KEY:sk-tpnnprwtipwwbtojamuccbosjlezyhlqhvplyxnqmqyfiqyg}"
    model: "${FAST_LLM_MODEL:zai-org/GLM-4.5-Air}"
    timeout: 60
    temperature: 0.7

# ========================
# Database Configuration
# ========================
database:
  # MySQL配置
  mysql:
    host: "${MYSQL_HOST:localhost}"
    port: "${MYSQL_PORT:3306}"
    user: "${MYSQL_USER:root}"
    password: "${MYSQL_PASSWORD}"
    database: "${MYSQL_DATABASE:personal_agent}"
    charset: "utf8mb4"
    pool_size: 10
    max_overflow: 20

  # ChromaDB配置
  chromadb:
    mode: "${CHROMADB_MODE:local}"  # local 或 server
    # 本地模式配置
    path: "${CHROMADB_PATH:./data/chromadb}"
    # Server模式配置（Celery worker必须使用server模式）
    host: "${CHROMADB_HOST:localhost}"
    port: "${CHROMADB_PORT:11530}"
    # collection_prefix: 已移除，直接使用collection名称

  # Redis配置
  redis:
    host: "${REDIS_HOST:localhost}"
    port: "${REDIS_PORT:6379}"
    password: "${REDIS_PASSWORD:}"
    db: 0
    max_connections: 50

# ========================
# Web Server Configuration
# ========================
web:
  host: "0.0.0.0"
  port: 11528
  reload: false  # Windows下禁用reload避免模块加载问题
  workers: 1

# ========================
# Chat Service Configuration
# ========================
chat:
  # 活跃历史窗口（动态Token预算）
  active_history:
    max_tokens: 15000  # 最大Token数
    reserve_tokens: 5000  # 为回复预留的Token数

  # 意图补全
  intent_completion:
    enabled: true
    min_length: 10  # 最小触发长度

  # 召回工具
  recall_tools:
    enabled: true
    max_results: 10  # 每次召回最大结果数

# ========================
# News Service Configuration
# ========================
news:
  # RSS抓取
  rss_crawler:
    enabled: true
    interval: 300  # 抓取间隔（秒）
    sources: []  # RSS源列表，可在运行时配置

  # 去重配置
  deduplication:
    bloom_filter_size: 100000
    similarity_threshold: 0.85

  # 自动摘要
  auto_summary:
    enabled: true
    max_length: 200  # 摘要最大长度

# ========================
# Agent Configuration
# ========================
agent:
  max_iterations: null  # 最大推理轮次（null表示不限制）
  tool_timeout: 30  # 工具执行超时（秒）

# ========================
# Retrieval Configuration
# ========================
retrieval:
  similarity_threshold: 0.4  # 向量检索相似度阈值
  rrf_k: 60  # RRF融合参数

# ========================
# Prompts Configuration
# ========================
prompts:
  language: "zh"  # zh 或 en
  file: "prompts_zh.yaml"

# ========================
# Logging Configuration
# ========================
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "json"  # text 或 json
  file: "./logs/app.log"

# ========================
# Vector Sync Configuration
# ========================
vector_sync:
  enabled: true
  mode: "full"  # full: 全量同步所有记录, incremental: 仅同步最近1000条
  incremental_limit: 1000
  async_mode: true
  cleanup_orphaned: true  # 是否清理孤立向量（ChromaDB有但MySQL没有的）

# ========================
# File Parsing Configuration
# ========================
file_parsing:
  # 缓存配置
  cache:
    enabled: true
    l1_ttl_days: 30  # L1缓存（原始解析结果）过期时间
    l2_ttl_days: 7   # L2缓存（提取结果）过期时间
    l3_ttl_days: 14  # L3缓存（翻译结果）过期时间

  # 引擎配置
  engines:
    # PDF引擎配置（优先级从高到低）
    pdf:
      default: "local"  # 默认PDF引擎：marker/paddleocr/local
      local:
        enabled: true  # 本地引擎，速度快
        priority: 1  # 最高优先级
      marker:
        enabled: true
        priority: 2  # 备用，质量高但慢
      paddleocr:
        enabled: false  # 跳过PaddleOCR（Windows不支持或性能问题）
        priority: 3

    # Office文档引擎
    docx:
      enabled: true
    pptx:
      enabled: true
    xlsx:
      enabled: true

  # PaddleOCR-VL模型预热配置
  model_warmup:
    enabled: true  # 是否在启动时检查模型状态
    auto_download: false  # 是否在启动时主动下载缺失模型（设为true会在启动时下载，耗时较长）

  # 提取服务配置
  extraction:
    enabled: true
    model: "${LLM_MODEL:qwen3-max}"  # 使用主LLM模型（需要强推理能力）
    max_tokens: 95000   # 最大Token限制
    degradation_ratios: [1.0, 0.7, 0.49]  # 降级策略比例
    final_char_limit: 25000  # 最终字符限制

  # 翻译服务配置
  translation:
    enabled: true
    model: "${LLM_MODEL:qwen3-max}"  # 暂时使用主模型（后续可改为FAST_LLM_MODEL）
    batch_size: 3000  # 批量翻译的批次大小（字符数）
    default_target_lang: "Chinese"

  # 文件限制
  limits:
    max_file_size_mb: 100  # 最大文件大小（MB）
    max_pages: 200         # 最大页数
    token_limit: 150000    # Token总限制

# ========================
# Browser Pool Configuration
# ========================
browser_pool:
  enabled: true
  capacity:
    min_size: 0      # 最小浏览器数（空闲时自动缩容到0）
    max_size: 10     # 最大浏览器数
    init_size: 3     # 初始化时创建的浏览器数
  lifecycle:
    idle_timeout: 300         # 空闲超时（秒），5分钟无使用自动关闭
    max_lifetime: 3600        # 最大生命周期（秒），1小时后强制替换
    max_pages_per_browser: 50 # 每个浏览器最大页面数
  launch:
    headless: true   # 无头模式
    args:
      - --no-sandbox
      - --disable-dev-shm-usage
      - --disable-blink-features=AutomationControlled
  health_check:
    interval: 60     # 健康检查间隔（秒）

# ========================
# Celery Configuration
# ========================
celery:
  # 消息队列Broker（使用Redis）
  broker:
    url: "${CELERY_BROKER_URL:redis://localhost:6379/1}"

  # 结果存储Backend
  result_backend:
    url: "${CELERY_RESULT_BACKEND:redis://localhost:6379/2}"
    result_expires: 3600  # 结果过期时间（秒），1小时

  # Worker配置
  worker:
    concurrency: 4                # Worker并发数（根据CPU核心数调整）
    prefetch_multiplier: 1        # 预取任务数（1=一次只拉取1个任务）
    max_tasks_per_child: 1000     # 每个worker子进程最多执行1000个任务后重启（防止内存泄漏）
    pool: "solo"                  # 进程池类型：solo（Windows推荐）/prefork（Unix）/gevent

  # 任务路由（不同类型任务路由到不同队列）
  task_routes:
    # 采集器任务路由到collector队列
    "backend.tasks.collector_tasks.*":
      queue: "collector"
      routing_key: "collector"
    # AI日报任务路由到report队列（高优先级）
    "backend.tasks.ai_report_tasks.*":
      queue: "report"
      routing_key: "report"
      priority: 9

  # 任务超时配置
  task_time_limits:
    # 采集器任务超时（10分钟）
    run_collector: 600
    # AI日报任务超时（30分钟）
    generate_daily_report: 1800

  # 任务执行配置
  task:
    acks_late: true                  # 任务执行成功后才确认（防止worker崩溃导致任务丢失）
    reject_on_worker_lost: true      # Worker丢失时拒绝任务
    serializer: "json"               # 任务序列化格式
    result_serializer: "json"
    accept_content: ["json"]         # 接受的内容类型

  # Beat定时调度配置
  beat:
    schedule_filename: "./data/celerybeat-schedule"  # 定时任务调度文件路径

    # AI日报定时生成配置（24小时制）
    ai_report_schedule:
      governance:
        hour: 8
        minute: 0
      research:
        hour: 8
        minute: 0
      industry:
        hour: 8
        minute: 0
      comprehensive:
        hour: 8
        minute: 0

  # 监控配置
  monitoring:
    flower_port: 5555                # Flower监控端口
